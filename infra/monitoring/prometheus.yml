global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: auth_service
    static_configs:
      - targets: [auth_service:8001]
    metrics_path: /metrics

  - job_name: upload_service
    static_configs:
      - targets: [upload_service:8002]
    metrics_path: /metrics

  - job_name: analysis_service
    static_configs:
      - targets: [analysis_service:8003]
    metrics_path: /metrics

  - job_name: gradcam_service
    static_configs:
      - targets: [gradcam_service:8004]
    metrics_path: /metrics

  - job_name: report_service
    static_configs:
      - targets: [report_service:8005]
    metrics_path: /metrics

  - job_name: postgres_exporter
    static_configs:
      - targets: [postgres_exporter:9187]

  - job_name: redis_exporter
    static_configs:
      - targets: [redis_exporter:9121]
